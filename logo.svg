<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4CE6"/>
      <stop offset="100%" stop-color="#4F8EF7"/>
    </linearGradient>
  </defs>

  <!-- Brain icon - abstract left hemisphere with neural network lines -->
  <g transform="translate(10, 10)">
    <!-- Brain outer shape -->
    <path d="M35 8 C15 8 5 20 5 35 C5 55 15 70 30 72 C22 78 15 82 15 87 C15 91 18 94 22 94 C30 94 38 88 40 80 C42 88 50 94 58 94 C62 94 65 91 65 87 C65 82 58 78 50 72 C65 70 75 55 75 35 C75 20 65 8 45 8 C42 3 38 0 35 0 C31 0 28 3 26 6 C24 3 20 0 16 0 C10 0 6 4 6 8 C6 12 10 15 15 16 C22 18 28 12 28 12 C30 10 33 8 35 8Z"
          fill="url(#brainGrad)" opacity="0.15"/>
    
    <!-- Neural network nodes -->
    <circle cx="25" cy="30" r="4" fill="url(#brainGrad)"/>
    <circle cx="45" cy="25" r="4" fill="url(#brainGrad)"/>
    <circle cx="55" cy="40" r="4" fill="url(#brainGrad)"/>
    <circle cx="40" cy="50" r="4" fill="url(#brainGrad)"/>
    <circle cx="20" cy="55" r="4" fill="url(#brainGrad)"/>
    <circle cx="35" cy="70" r="4" fill="url(#brainGrad)"/>
    <circle cx="55" cy="65" r="4" fill="url(#brainGrad)"/>
    
    <!-- Neural connections -->
    <line x1="25" y1="30" x2="45" y2="25" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="45" y1="25" x2="55" y2="40" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="20" y2="55" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="40" y2="50" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="55" y2="40" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="35" y2="70" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="40" x2="55" y2="65" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="70" x2="55" y2="65" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="40" y2="50" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="45" y1="25" x2="40" y2="50" stroke="url(#brainGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Company name -->
  <text x="95" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#1A1F3C">AI Content</text>
  <text x="95" y="72" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#6B4CE6">Factory</text>
</svg>
